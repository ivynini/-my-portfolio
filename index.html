<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>丁羽微的作品集</title>
    <style>
        :root { --bg: #e8f0e0; }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            height: 500vh;
            overflow-x: hidden;
            overscroll-behavior: none;
            font-family: 'Georgia', 'Noto Serif SC', 'STSong', serif;
            cursor: default;
        }

        #canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 0;
            pointer-events: none;
        }

        .header {
            position: fixed;
            top: 0; left: 0;
            width: 100%;
            padding: 28px 40px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            z-index: 10;
            pointer-events: none;
        }

        .logo {
            font-size: 1.25rem;
            font-weight: 700;
            color: #3a4a2a;
            letter-spacing: 0.06em;
            text-shadow: 0 0 20px rgba(80,110,50,0.25);
            pointer-events: auto;
        }

        .nav {
            display: flex;
            gap: 32px;
            pointer-events: auto;
        }

        .nav-btn {
            position: relative;
            display: inline-block;
            font-size: 0.95rem;
            font-family: 'Georgia', 'Noto Serif SC', serif;
            color: #5a7a4a;
            text-decoration: none;
            letter-spacing: 0.08em;
            text-transform: lowercase;
            cursor: pointer;
            user-select: none;
            transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1),
                        color 0.35s ease;
        }

        .nav-btn:hover {
            color: #2a3a1a;
            transform: translateY(-4px) scale(1.12);
        }

        .nav-btn::after {
            content: '';
            position: absolute;
            left: 0; bottom: -4px;
            width: 0; height: 1px;
            background: #5a7a4a;
            transition: width 0.35s ease;
        }

        .nav-btn:hover::after {
            width: 100%;
        }

        .scroll-hint {
            position: fixed;
            bottom: 32px; left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            pointer-events: none;
            transition: opacity 0.6s;
        }

        .scroll-hint span {
            font-size: 0.7rem;
            color: #7a8a6a;
            letter-spacing: 0.12em;
        }

        .scroll-arrow {
            width: 20px; height: 20px;
            border-right: 1px solid #7a8a6a;
            border-bottom: 1px solid #7a8a6a;
            transform: rotate(45deg);
            animation: scrollPulse 2s ease-in-out infinite;
        }

        @keyframes scrollPulse {
            0%, 100% { opacity: 0.3; transform: rotate(45deg) translateY(0); }
            50%      { opacity: 1;   transform: rotate(45deg) translateY(6px); }
        }
    </style>
</head>
<body>

    <header class="header">
        <div class="logo">丁羽微的作品集</div>
        <nav class="nav">
            <a href="#" class="nav-btn" data-text="project">project</a>
            <a href="#" class="nav-btn" data-text="about">about</a>
            <a href="#" class="nav-btn" data-text="contact">contact</a>
        </nav>
    </header>

    <canvas id="canvas"></canvas>

    <div class="scroll-hint" id="scrollHint">
        <span>下滑探索</span>
        <div class="scroll-arrow"></div>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // ============ DOM ============
        const canvas = document.getElementById('canvas');
        const scrollHint = document.getElementById('scrollHint');

        // ============ Renderer ============
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.1;

        // ============ Scene & Camera ============
        const BG_COLOR = '#e8f0e0';
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(BG_COLOR);
        scene.fog = new THREE.Fog(BG_COLOR, 6, 22);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.5, 50);
        const cameraBase = { x: 0, y: 0.6, z: 7.5 };
        camera.position.set(cameraBase.x, cameraBase.y, cameraBase.z);
        camera.lookAt(0, -0.2, 0);

        // ============ Lighting ============
        scene.add(new THREE.AmbientLight('#d8e8d0', 2.8));

        const sunLight = new THREE.DirectionalLight('#fffef8', 6.5);
        sunLight.position.set(5, 8, 4);
        sunLight.castShadow = true;
        sunLight.shadow.mapSize.width = 2048;
        sunLight.shadow.mapSize.height = 2048;
        sunLight.shadow.camera.near = 0.5;
        sunLight.shadow.camera.far = 30;
        sunLight.shadow.camera.left = -8;
        sunLight.shadow.camera.right = 8;
        sunLight.shadow.camera.top = 8;
        sunLight.shadow.camera.bottom = -8;
        sunLight.shadow.bias = -0.00015;
        sunLight.shadow.normalBias = 0.02;
        scene.add(sunLight);

        const rimLight = new THREE.DirectionalLight('#b8d8c0', 1.8);
        rimLight.position.set(-3, 1, -4);
        scene.add(rimLight);

        const bounceLight = new THREE.DirectionalLight('#c8d8b8', 1.6);
        bounceLight.position.set(0, -1.5, 2);
        scene.add(bounceLight);

        // ============ Ground shadow catcher ============
        const ground = new THREE.Mesh(
            new THREE.PlaneGeometry(20, 20),
            new THREE.ShadowMaterial({ opacity: 0.25 })
        );
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = -3.5;
        ground.receiveShadow = true;
        scene.add(ground);

        // ============ Procedural soil texture (high detail) ============
        function createSoilTexture() {
            const size = 1024;
            const c = document.createElement('canvas');
            c.width = size; c.height = size;
            const ctx = c.getContext('2d');

            // Base — varied brown gradient
            const grad = ctx.createRadialGradient(size * 0.35, size * 0.35, size * 0.02, size / 2, size / 2, size * 0.55);
            grad.addColorStop(0, '#9B8365');
            grad.addColorStop(0.15, '#8B7355');
            grad.addColorStop(0.35, '#7B5A38');
            grad.addColorStop(0.55, '#6B4A28');
            grad.addColorStop(0.75, '#5C3A1A');
            grad.addColorStop(0.9, '#4A2A10');
            grad.addColorStop(1, '#3B1F08');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, size, size);

            // Fine grain noise
            const img = ctx.getImageData(0, 0, size, size);
            const d = img.data;
            for (let i = 0; i < d.length; i += 4) {
                const n = (Math.random() - 0.5) * 28;
                d[i]     = Math.min(255, Math.max(0, d[i] + n));
                d[i + 1] = Math.min(255, Math.max(0, d[i + 1] + n * 0.65));
                d[i + 2] = Math.min(255, Math.max(0, d[i + 2] + n * 0.35));
            }
            ctx.putImageData(img, 0, 0);

            // Organic dark patches (humus)
            for (let i = 0; i < 80; i++) {
                const x = Math.random() * size;
                const y = Math.random() * size;
                const r = 4 + Math.random() * 20;
                const g = ctx.createRadialGradient(x, y, 0, x, y, r);
                g.addColorStop(0, `rgba(20,10,0,${0.15 + Math.random() * 0.25})`);
                g.addColorStop(1, 'rgba(0,0,0,0)');
                ctx.fillStyle = g;
                ctx.beginPath();
                ctx.ellipse(x, y, r, r * (0.6 + Math.random() * 0.8), Math.random() * Math.PI, 0, Math.PI * 2);
                ctx.fill();
            }

            // Mineral specks (perlite / sand grains)
            for (let i = 0; i < 400; i++) {
                const x = Math.random() * size;
                const y = Math.random() * size;
                const bright = 160 + Math.random() * 80;
                ctx.fillStyle = `rgba(${bright},${bright * 0.85},${bright * 0.6},${0.08 + Math.random() * 0.12})`;
                ctx.fillRect(x, y, 1.5 + Math.random() * 3, 1.5 + Math.random() * 3);
            }

            // Subtle crack lines
            ctx.strokeStyle = 'rgba(30,15,5,0.25)';
            ctx.lineWidth = 0.6;
            for (let i = 0; i < 30; i++) {
                ctx.beginPath();
                let cx = Math.random() * size;
                let cy = Math.random() * size;
                ctx.moveTo(cx, cy);
                const steps = 3 + Math.floor(Math.random() * 6);
                for (let j = 0; j < steps; j++) {
                    cx += (Math.random() - 0.5) * 60;
                    cy += (Math.random() - 0.5) * 60;
                    ctx.lineTo(cx, cy);
                }
                ctx.stroke();
            }

            // Sparse mossy patches (greenish tint)
            for (let i = 0; i < 25; i++) {
                const x = Math.random() * size;
                const y = Math.random() * size;
                const r = 6 + Math.random() * 18;
                const g = ctx.createRadialGradient(x, y, 0, x, y, r);
                g.addColorStop(0, 'rgba(80,120,40,0.12)');
                g.addColorStop(1, 'rgba(0,0,0,0)');
                ctx.fillStyle = g;
                ctx.fillRect(x - r, y - r, r * 2, r * 2);
            }

            const tex = new THREE.CanvasTexture(c);
            tex.wrapS = THREE.RepeatWrapping;
            tex.wrapT = THREE.RepeatWrapping;
            tex.colorSpace = THREE.SRGBColorSpace;
            return tex;
        }

        // ============ Dirt Sphere ============
        const SPHERE_RADIUS = 1.8;
        const sphereGeo = new THREE.SphereGeometry(SPHERE_RADIUS, 150, 150);
        const positions = sphereGeo.attributes.position;
        const vertexCount = positions.count;

        function noise3D(x, y, z, freq, amp) {
            return amp * (
                Math.sin(x * freq + y * 1.3) * Math.cos(y * freq - z * 0.7) * Math.sin(z * freq + x * 0.9) +
                Math.cos(x * freq * 1.7 - y * 0.6) * Math.sin(z * freq * 1.4 + x * 1.1) * Math.cos(y * freq * 0.8 + z * 1.5)
            ) * 0.5;
        }

        for (let i = 0; i < vertexCount; i++) {
            const x = positions.getX(i), y = positions.getY(i), z = positions.getZ(i);
            const len = Math.sqrt(x * x + y * y + z * z);
            const nx = x / len, ny = y / len, nz = z / len;

            const displacement =
                noise3D(nx, ny, nz, 3.5, 0.14) +
                noise3D(nx, ny, nz, 7.0, 0.08) +
                noise3D(nx, ny, nz, 13.0, 0.045) +
                noise3D(nx, ny, nz, 22.0, 0.022) +
                noise3D(nx, ny, nz, 35.0, 0.01);

            const newLen = len + displacement;
            positions.setXYZ(i, nx * newLen, ny * newLen, nz * newLen);
        }
        sphereGeo.computeVertexNormals();
        sphereGeo.attributes.position.needsUpdate = true;

        // Store surface data
        const surfacePoints = [];
        const surfaceNormals = [];
        const posAttr = sphereGeo.attributes.position;
        const normAttr = sphereGeo.attributes.normal;
        for (let i = 0; i < vertexCount; i++) {
            surfacePoints.push(new THREE.Vector3(posAttr.getX(i), posAttr.getY(i), posAttr.getZ(i)));
            surfaceNormals.push(new THREE.Vector3(normAttr.getX(i), normAttr.getY(i), normAttr.getZ(i)).normalize());
        }

        const sphere = new THREE.Mesh(sphereGeo, new THREE.MeshStandardMaterial({
            map: createSoilTexture(),
            roughness: 0.88,
            metalness: 0.01,
            color: new THREE.Color('#c0a888'),
        }));
        sphere.castShadow = true;
        sphere.receiveShadow = true;
        scene.add(sphere);

        // ============ Surface pebbles (more variety) ============
        const pebbleGroup = new THREE.Group();
        const pebbleGeos = [
            new THREE.IcosahedronGeometry(0.025, 1),
            new THREE.IcosahedronGeometry(0.02, 0),
            new THREE.TetrahedronGeometry(0.028, 0),
            new THREE.SphereGeometry(0.022, 4, 3),
        ];
        const pebbleMats = [
            new THREE.MeshStandardMaterial({ color: '#8a7a60', roughness: 0.65, metalness: 0.05 }),
            new THREE.MeshStandardMaterial({ color: '#7a6a50', roughness: 0.7, metalness: 0.03 }),
            new THREE.MeshStandardMaterial({ color: '#9b8b70', roughness: 0.6, metalness: 0.08 }),
            new THREE.MeshStandardMaterial({ color: '#6a5a40', roughness: 0.75, metalness: 0.02 }),
        ];

        for (let i = 0; i < 350; i++) {
            const idx = Math.floor(Math.random() * vertexCount);
            const pos = surfacePoints[idx].clone();
            const normal = surfaceNormals[idx].clone();
            const s = 0.35 + Math.random() * 2.2;
            pos.add(normal.clone().multiplyScalar(0.018 * s));

            const gi = Math.floor(Math.random() * pebbleGeos.length);
            const pebble = new THREE.Mesh(pebbleGeos[gi], pebbleMats[gi]);
            pebble.position.copy(pos);
            pebble.scale.setScalar(s);
            pebble.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, Math.random() * Math.PI);
            pebble.castShadow = true;
            pebbleGroup.add(pebble);
        }
        sphere.add(pebbleGroup);

        // ============ Curved Grass System ============
        const grassGroup = new THREE.Group();
        sphere.add(grassGroup);

        // Create a curved blade geometry with given bend amount
        function createCurvedBladeGeo(bendAmount, segments) {
            const baseHW = 0.028;
            const tipHW = 0.003;
            const height = 1.0;
            const verts = [];

            for (let s = 0; s < segments; s++) {
                const t0 = s / segments;
                const t1 = (s + 1) / segments;
                const y0 = t0 * height;
                const y1 = t1 * height;

                // Smooth curve: use sin for more natural arc
                const x0 = bendAmount * Math.sin(t0 * Math.PI / 2);
                const x1 = bendAmount * Math.sin(t1 * Math.PI / 2);

                const w0 = baseHW * (1 - t0) + tipHW * t0;
                const w1 = baseHW * (1 - t1) + tipHW * t1;

                // Front face (2 triangles)
                verts.push(x0 - w0, y0, 0, x0 + w0, y0, 0, x1 - w1, y1, 0);
                verts.push(x0 + w0, y0, 0, x1 + w1, y1, 0, x1 - w1, y1, 0);

                // Back face (2 triangles)
                verts.push(x0 + w0, y0, 0, x0 - w0, y0, 0, x1 + w1, y1, 0);
                verts.push(x0 - w0, y0, 0, x1 - w1, y1, 0, x1 + w1, y1, 0);
            }

            const geo = new THREE.BufferGeometry();
            geo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(verts), 3));
            geo.computeVertexNormals();
            return geo;
        }

        const BEND_VARIANTS = [-0.20, -0.12, -0.05, 0.05, 0.12, 0.20];
        const BLADES_PER_MESH = 2500;
        const TOTAL_GRASS = BEND_VARIANTS.length * BLADES_PER_MESH; // 15000
        const SEGMENTS = 6;

        const grassMeshes = [];
        const allGrassData = [];
        const dummies = [];
        const grassMats = [];

        const upVec = new THREE.Vector3(0, 1, 0);
        const _axis = new THREE.Vector3();
        const _quat = new THREE.Quaternion();
        const _tiltQuat = new THREE.Quaternion();

        for (let v = 0; v < BEND_VARIANTS.length; v++) {
            const geo = createCurvedBladeGeo(BEND_VARIANTS[v], SEGMENTS);
            const mat = new THREE.MeshStandardMaterial({
                color: '#4a8c3f',
                roughness: 0.5,
                metalness: 0,
                side: THREE.DoubleSide,
            });
            grassMats.push(mat);

            const mesh = new THREE.InstancedMesh(geo, mat, BLADES_PER_MESH);
            mesh.castShadow = true;
            mesh.receiveShadow = true;

            const data = [];
            const dummy = new THREE.Object3D();

            for (let i = 0; i < BLADES_PER_MESH; i++) {
                let idx;
                const rnd = Math.random();
                if (rnd < 0.7) {
                    idx = Math.floor(Math.random() * vertexCount);
                    while (surfacePoints[idx].y < -0.4 && Math.random() < 0.65) idx = Math.floor(Math.random() * vertexCount);
                } else if (rnd < 0.92) {
                    idx = Math.floor(Math.random() * vertexCount);
                    while (Math.abs(surfacePoints[idx].y) > 1.1 && Math.random() < 0.5) idx = Math.floor(Math.random() * vertexCount);
                } else {
                    idx = Math.floor(Math.random() * vertexCount);
                }

                const pos = surfacePoints[idx].clone();
                const normal = surfaceNormals[idx].clone();
                const bladeHeight = 0.15 + Math.random() * 0.50;
                const threshold = Math.random() * 0.78;
                const growthSpeed = 0.25 + Math.random() * 0.75;
                const tilt = (Math.random() - 0.5) * 0.55;
                const tiltDir = Math.random() * Math.PI * 2;

                _quat.setFromUnitVectors(upVec, normal);
                _axis.set(Math.cos(tiltDir), 0, Math.sin(tiltDir));
                _tiltQuat.setFromAxisAngle(_axis, tilt);
                _quat.multiply(_tiltQuat);

                data.push({
                    position: pos,
                    baseQuat: _quat.clone(),
                    bladeHeight,
                    threshold,
                    growthSpeed,
                });

                dummy.position.copy(pos);
                dummy.quaternion.copy(_quat);
                dummy.scale.set(0.75, 0.001, 0.75);
                dummy.updateMatrix();
                mesh.setMatrixAt(i, dummy.matrix);
            }
            mesh.instanceMatrix.needsUpdate = true;

            // Color variation
            const gc = new THREE.Color();
            for (let i = 0; i < BLADES_PER_MESH; i++) {
                gc.setHSL(
                    0.22 + Math.random() * 0.12,
                    0.5 + Math.random() * 0.45,
                    0.22 + Math.random() * 0.32
                );
                mesh.setColorAt(i, gc);
            }
            mesh.instanceColor.needsUpdate = true;

            grassMeshes.push(mesh);
            allGrassData.push(data);
            dummies.push(dummy);
            grassGroup.add(mesh);
        }

        // ============ Floating particles ============
        const particlesGroup = new THREE.Group();
        scene.add(particlesGroup);
        const particleDataArr = [];

        for (let i = 0; i < 180; i++) {
            const mat = new THREE.MeshBasicMaterial({
                color: new THREE.Color().setHSL(0.12, 0.25, 0.35 + Math.random() * 0.4),
                transparent: true,
                opacity: 0.2 + Math.random() * 0.45,
            });
            const p = new THREE.Mesh(new THREE.SphereGeometry(0.012, 4, 4), mat);
            const angle = Math.random() * Math.PI * 2;
            const phi = (Math.random() - 0.5) * Math.PI;
            const radius = 2.0 + Math.random() * 1.8;
            p.position.set(
                Math.cos(angle) * Math.cos(phi) * radius,
                Math.sin(phi) * radius,
                Math.sin(angle) * Math.cos(phi) * radius
            );
            p.userData = {
                basePos: p.position.clone(),
                speed: 0.15 + Math.random() * 0.55,
                amplitude: 0.08 + Math.random() * 0.28,
                phase: Math.random() * Math.PI * 2,
                orbitSpeed: (Math.random() - 0.5) * 0.25,
            };
            particlesGroup.add(p);
            particleDataArr.push(p);
        }

        // ============ State ============
        let currentProgress = 0;
        let currentRotation = 0;
        let mouseX = 0, mouseY = 0;
        let targetMouseX = 0, targetMouseY = 0;

        function getScrollProgress() {
            return Math.max(0, Math.min(1, window.scrollY / (window.innerHeight * 4)));
        }

        // ============ Update grass ============
        function updateGrass(progress) {
            for (let m = 0; m < grassMeshes.length; m++) {
                const data = allGrassData[m];
                const mesh = grassMeshes[m];
                const dummy = dummies[m];

                for (let i = 0; i < data.length; i++) {
                    const gd = data[i];
                    let scale;
                    if (progress <= gd.threshold) {
                        scale = 0.001;
                    } else if (progress >= gd.threshold + gd.growthSpeed) {
                        scale = gd.bladeHeight;
                    } else {
                        const t = (progress - gd.threshold) / gd.growthSpeed;
                        const eased = t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;
                        scale = 0.001 + (gd.bladeHeight - 0.001) * eased;
                    }

                    dummy.position.copy(gd.position);
                    dummy.quaternion.copy(gd.baseQuat);
                    dummy.scale.set(0.75, Math.max(0.001, scale), 0.75);
                    dummy.updateMatrix();
                    mesh.setMatrixAt(i, dummy.matrix);
                }
                mesh.instanceMatrix.needsUpdate = true;
            }
        }

        // ============ Mouse tracking ============
        window.addEventListener('mousemove', (e) => {
            targetMouseX = (e.clientX / window.innerWidth) * 2 - 1;
            targetMouseY = -(e.clientY / window.innerHeight) * 2 + 1;
        });

        // ============ Animation loop ============
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);

            const dt = Math.min(clock.getDelta(), 0.1);
            const time = performance.now() * 0.001;

            const targetProgress = getScrollProgress();
            currentProgress += (targetProgress - currentProgress) * 3.0 * dt;

            const targetRotation = currentProgress * Math.PI * 3.0;
            currentRotation += (targetRotation - currentRotation) * 2.5 * dt;
            sphere.rotation.y = currentRotation;
            sphere.rotation.x = Math.sin(currentRotation * 0.3) * 0.12;

            updateGrass(currentProgress);

            for (const p of particleDataArr) {
                const ud = p.userData;
                const bp = ud.basePos;
                p.position.set(
                    bp.x + Math.sin(time * ud.speed + ud.phase) * ud.amplitude,
                    bp.y + Math.cos(time * ud.speed * 1.3 + ud.phase) * ud.amplitude,
                    bp.z + Math.cos(time * ud.speed * 0.7 + ud.phase) * ud.amplitude
                );
                const a = Math.atan2(p.position.z, p.position.x) + ud.orbitSpeed * dt;
                const r = Math.sqrt(p.position.x ** 2 + p.position.z ** 2);
                p.position.x = Math.cos(a) * r;
                p.position.z = Math.sin(a) * r;
            }

            scrollHint.style.opacity = currentProgress > 0.05 ? Math.max(0, 1 - currentProgress * 10) : 1;

            mouseX += (targetMouseX - mouseX) * 2.5 * dt;
            mouseY += (targetMouseY - mouseY) * 2.5 * dt;
            camera.position.x = cameraBase.x + mouseX * 0.35;
            camera.position.y = cameraBase.y + mouseY * 0.25;
            camera.lookAt(0, -0.2, 0);

            renderer.render(scene, camera);
        }

        // ============ Button scramble effect ============
        const scrambleChars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz!@#$%&*?<>';

        document.querySelectorAll('.nav-btn').forEach(btn => {
            const originalText = btn.dataset.text;
            let interval = null;
            let hovered = false;

            btn.addEventListener('mouseenter', () => {
                hovered = true;
                if (interval) clearInterval(interval);
                let iter = 0;
                const maxIter = 10;

                interval = setInterval(() => {
                    if (!hovered) { clearInterval(interval); btn.textContent = originalText; return; }
                    const revealed = Math.floor((iter / maxIter) * originalText.length);
                    btn.textContent = originalText.split('').map((ch, i) => {
                        if (i < revealed) return originalText[i];
                        if (ch === ' ') return ' ';
                        return scrambleChars[Math.floor(Math.random() * scrambleChars.length)];
                    }).join('');
                    iter++;
                    if (iter > maxIter) { clearInterval(interval); btn.textContent = originalText; }
                }, 45);
            });

            btn.addEventListener('mouseleave', () => {
                hovered = false;
                if (interval) { clearInterval(interval); interval = null; }
                btn.textContent = originalText;
            });
        });

        // ============ Resize ============
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // ============ Init & Start ============
        updateGrass(0);
        animate();
    </script>
</body>
</html>
