<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>丁羽微的作品集</title>
    <style>
        :root { --bg: #060a0f; }
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            height: 500vh;
            overflow-x: hidden;
            overscroll-behavior: none;
            font-family: 'Georgia', 'Noto Serif SC', 'STSong', serif;
            cursor: default;
        }

        #canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 0;
        }

        .header {
            position: fixed;
            top: 0; left: 0;
            width: 100%;
            padding: 28px 40px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            z-index: 10;
            pointer-events: none;
        }

        .logo {
            font-size: 1.25rem;
            font-weight: 700;
            color: #a0d8c0;
            letter-spacing: 0.06em;
            text-shadow: 0 0 24px rgba(0,220,160,0.3);
            pointer-events: auto;
        }

        .nav {
            display: flex;
            gap: 32px;
            pointer-events: auto;
        }

        .nav-btn {
            position: relative;
            display: inline-block;
            font-size: 0.95rem;
            font-family: 'Georgia', 'Noto Serif SC', serif;
            color: #80b8a0;
            text-decoration: none;
            letter-spacing: 0.08em;
            text-transform: lowercase;
            cursor: pointer;
            user-select: none;
            transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1),
                        color 0.35s ease;
        }

        .nav-btn:hover {
            color: #00eebb;
            transform: translateY(-4px) scale(1.12);
        }

        .nav-btn::after {
            content: '';
            position: absolute;
            left: 0; bottom: -4px;
            width: 0; height: 1px;
            background: #00ddbb;
            transition: width 0.35s ease;
        }

        .nav-btn:hover::after { width: 100%; }

        .scroll-hint {
            position: fixed;
            bottom: 32px; left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            pointer-events: none;
            transition: opacity 0.6s;
        }

        .scroll-hint span {
            font-size: 0.7rem;
            color: #608070;
            letter-spacing: 0.12em;
        }

        .scroll-arrow {
            width: 20px; height: 20px;
            border-right: 1px solid #608070;
            border-bottom: 1px solid #608070;
            transform: rotate(45deg);
            animation: scrollPulse 2s ease-in-out infinite;
        }

        @keyframes scrollPulse {
            0%, 100% { opacity: 0.3; transform: rotate(45deg) translateY(0); }
            50%      { opacity: 1;   transform: rotate(45deg) translateY(6px); }
        }
    </style>
</head>
<body>

    <header class="header">
        <div class="logo">丁羽微的作品集</div>
        <nav class="nav">
            <a href="#" class="nav-btn">project</a>
            <a href="#" class="nav-btn">about</a>
            <a href="#" class="nav-btn">contact</a>
        </nav>
    </header>

    <canvas id="canvas"></canvas>

    <div class="scroll-hint" id="scrollHint">
        <span>下滑探索</span>
        <div class="scroll-arrow"></div>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        const canvas = document.getElementById('canvas');
        const scrollHint = document.getElementById('scrollHint');

        // ===================== RENDERER =====================
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.1;
        renderer.outputColorSpace = THREE.SRGBColorSpace;

        // ===================== SCENE =====================
        const BG = '#060a0f';
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(BG);
        scene.fog = new THREE.Fog(BG, 8, 25);

        const camera = new THREE.PerspectiveCamera(42, window.innerWidth / window.innerHeight, 0.3, 50);
        const camBase = { x: 0, y: 0.4, z: 7.5 };
        camera.position.set(camBase.x, camBase.y, camBase.z);
        camera.lookAt(0, -0.1, 0);

        // ===================== LIGHTING =====================
        scene.add(new THREE.AmbientLight('#1a2a30', 2.0));

        const key = new THREE.DirectionalLight('#e8fff8', 5.5);
        key.position.set(5, 7, 5);
        key.castShadow = true;
        key.shadow.mapSize.set(2048, 2048);
        key.shadow.camera.near = 0.3;
        key.shadow.camera.far = 30;
        key.shadow.camera.left = -7; key.shadow.camera.right = 7;
        key.shadow.camera.top = 7; key.shadow.camera.bottom = -7;
        key.shadow.bias = -0.00015;
        key.shadow.normalBias = 0.03;
        scene.add(key);

        const rim = new THREE.DirectionalLight('#4488aa', 2.0);
        rim.position.set(-4, 1, -4);
        scene.add(rim);

        const fill = new THREE.DirectionalLight('#223344', 1.2);
        fill.position.set(0, -1.5, 3);
        scene.add(fill);

        // Subtle blue accent from below
        const accent = new THREE.PointLight('#0066cc', 12, 8, 1.5);
        accent.position.set(0, -2.5, 0);
        scene.add(accent);

        // Shadow catcher
        const ground = new THREE.Mesh(
            new THREE.PlaneGeometry(20, 20),
            new THREE.ShadowMaterial({ opacity: 0.2 })
        );
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = -3.5;
        ground.receiveShadow = true;
        scene.add(ground);

        // ===================== SPHERE RADIUS =====================
        const R = 1.8;

        // ===================== INNER CORE (grass substrate) =====================
        const coreR = R * 0.92;
        const coreGeo = new THREE.SphereGeometry(coreR, 128, 128);

        // Procedural dark substrate texture
        function createSubstrateTex() {
            const S = 512;
            const c = document.createElement('canvas');
            c.width = S; c.height = S;
            const ctx = c.getContext('2d');
            ctx.fillStyle = '#1a2a18';
            ctx.fillRect(0, 0, S, S);

            const img = ctx.getImageData(0, 0, S, S);
            for (let i = 0; i < img.data.length; i += 4) {
                const n = (Math.random() - 0.5) * 20;
                img.data[i] = Math.min(255, Math.max(0, img.data[i] + n));
                img.data[i + 1] = Math.min(255, Math.max(0, img.data[i + 1] + n));
                img.data[i + 2] = Math.min(255, Math.max(0, img.data[i + 2] + n * 0.5));
            }
            ctx.putImageData(img, 0, 0);

            for (let i = 0; i < 100; i++) {
                const x = Math.random() * S, y = Math.random() * S;
                const r = 3 + Math.random() * 15;
                const g = ctx.createRadialGradient(x, y, 0, x, y, r);
                g.addColorStop(0, 'rgba(30,50,25,0.4)');
                g.addColorStop(1, 'rgba(0,0,0,0)');
                ctx.fillStyle = g;
                ctx.fillRect(x - r, y - r, r * 2, r * 2);
            }

            const tex = new THREE.CanvasTexture(c);
            tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
            tex.colorSpace = THREE.SRGBColorSpace;
            return tex;
        }

        const core = new THREE.Mesh(coreGeo, new THREE.MeshStandardMaterial({
            map: createSubstrateTex(),
            roughness: 0.9,
            metalness: 0.05,
            color: new THREE.Color('#2a3a25'),
        }));
        core.castShadow = true;
        core.receiveShadow = true;
        scene.add(core);

        // Store core surface data for grass placement
        const corePos = coreGeo.attributes.position;
        const coreV = corePos.count;
        const surfP = [], surfN = [];
        coreGeo.computeVertexNormals();
        for (let i = 0; i < coreV; i++) {
            surfP.push(new THREE.Vector3(corePos.getX(i), corePos.getY(i), corePos.getZ(i)));
            surfN.push(new THREE.Vector3(
                coreGeo.attributes.normal.getX(i),
                coreGeo.attributes.normal.getY(i),
                coreGeo.attributes.normal.getZ(i)
            ).normalize());
        }

        // ===================== TECH WIREFRAME SPHERE =====================
        const wireGroup = new THREE.Group();
        scene.add(wireGroup);

        // Main wireframe icosahedron
        const icoGeo = new THREE.IcosahedronGeometry(R, 5);
        const wireGeo = new THREE.WireframeGeometry(icoGeo);
        const wireMat = new THREE.MeshBasicMaterial({
            color: '#00cc88',
            transparent: true,
            opacity: 0.55,
            linewidth: 1,
        });
        const wireframe = new THREE.Mesh(wireGeo, wireMat);
        wireGroup.add(wireframe);

        // Second wireframe with slightly different color for depth
        const wireGeo2 = new THREE.WireframeGeometry(new THREE.IcosahedronGeometry(R * 1.005, 5));
        const wireMat2 = new THREE.MeshBasicMaterial({
            color: '#0066aa',
            transparent: true,
            opacity: 0.2,
        });
        wireGroup.add(new THREE.Mesh(wireGeo2, wireMat2));

        // Orbital rings
        function createOrbitalRing(radius, tubeRadius, rotation, color, opacity) {
            const torusGeo = new THREE.TorusGeometry(radius, tubeRadius, 16, 100);
            const torusMat = new THREE.MeshStandardMaterial({
                color,
                roughness: 0.3,
                metalness: 0.9,
                emissive: color,
                emissiveIntensity: 0.6,
                transparent: true,
                opacity,
            });
            const torus = new THREE.Mesh(torusGeo, torusMat);
            torus.rotation.set(rotation.x, rotation.y, rotation.z);
            torus.castShadow = true;
            return torus;
        }

        const ringR = R * 1.06;
        wireGroup.add(createOrbitalRing(ringR, 0.015, { x: Math.PI / 2, y: 0, z: 0 }, '#00ddbb', 0.7));
        wireGroup.add(createOrbitalRing(ringR, 0.013, { x: 1.1, y: 0.5, z: 0 }, '#00ccaa', 0.55));
        wireGroup.add(createOrbitalRing(ringR, 0.013, { x: -1.1, y: -0.3, z: 0.6 }, '#0088cc', 0.5));

        // Glowing vertex nodes
        const nodeGroup = new THREE.Group();
        wireGroup.add(nodeGroup);
        const nodeGeo = new THREE.SphereGeometry(0.025, 8, 8);
        const nodeMat = new THREE.MeshBasicMaterial({ color: '#00ffcc' });

        // Sample some icosahedron vertices for nodes
        const icoPos = icoGeo.attributes.position;
        const addedNodes = new Set();
        const nodeCount = Math.min(60, icoPos.count);
        for (let i = 0; i < nodeCount; i++) {
            const vi = Math.floor(Math.random() * icoPos.count);
            const key = `${icoPos.getX(vi).toFixed(3)},${icoPos.getY(vi).toFixed(3)},${icoPos.getZ(vi).toFixed(3)}`;
            if (addedNodes.has(key)) continue;
            addedNodes.add(key);
            const node = new THREE.Mesh(nodeGeo, nodeMat);
            node.position.set(icoPos.getX(vi), icoPos.getY(vi), icoPos.getZ(vi));
            nodeGroup.add(node);
        }

        // ===================== TECH PARTICLES =====================
        const techParticles = [];
        const techGroup = new THREE.Group();
        scene.add(techGroup);

        for (let i = 0; i < 120; i++) {
            const size = 0.008 + Math.random() * 0.025;
            const mat = new THREE.MeshBasicMaterial({
                color: Math.random() < 0.6 ? '#00ffcc' : '#0088dd',
                transparent: true,
                opacity: 0.3 + Math.random() * 0.6,
            });
            const p = new THREE.Mesh(new THREE.SphereGeometry(size, 4, 4), mat);
            const ang = Math.random() * Math.PI * 2;
            const phi = (Math.random() - 0.5) * Math.PI;
            const rad = R + 0.3 + Math.random() * 2.5;
            p.position.set(
                Math.cos(ang) * Math.cos(phi) * rad,
                Math.sin(phi) * rad,
                Math.sin(ang) * Math.cos(phi) * rad
            );
            p.userData = {
                base: p.position.clone(),
                spd: 0.1 + Math.random() * 0.5,
                amp: 0.1 + Math.random() * 0.4,
                ph: Math.random() * Math.PI * 2,
                orb: (Math.random() - 0.5) * 0.3,
            };
            techGroup.add(p);
            techParticles.push(p);
        }

        // ===================== GRASS SYSTEM =====================
        function createBladeTex() {
            const W = 64, H = 256;
            const c = document.createElement('canvas');
            c.width = W; c.height = H;
            const ctx = c.getContext('2d');
            const img = ctx.createImageData(W, H);
            for (let y = 0; y < H; y++) {
                const t = y / H;
                for (let x = 0; x < W; x++) {
                    const xu = x / W;
                    const ef = 1 - Math.abs(xu - 0.5) * 2;
                    const ea = Math.pow(ef, 1.8);
                    const ta = 1 - Math.pow(t, 1.5) * 0.78;
                    const a = ta * ea;
                    const r = 16 + t * 50 + (Math.random() - 0.5) * 10;
                    const g = 75 + t * 90 + (Math.random() - 0.5) * 16;
                    const b = 14 + t * 28 + (Math.random() - 0.5) * 7;
                    const idx = (y * W + x) * 4;
                    img.data[idx] = Math.min(255, r);
                    img.data[idx + 1] = Math.min(255, g);
                    img.data[idx + 2] = Math.min(255, b);
                    img.data[idx + 3] = Math.floor(Math.min(255, a * 255));
                }
            }
            ctx.putImageData(img, 0, 0);

            // Center vein
            ctx.strokeStyle = 'rgba(100,190,70,0.12)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(W / 2 - 1 + Math.random() * 2, 0);
            ctx.quadraticCurveTo(W / 2 + Math.random() * 3, H * 0.5, W / 2 - 1 + Math.random() * 2, H);
            ctx.stroke();

            const tex = new THREE.CanvasTexture(c);
            tex.wrapS = THREE.ClampToEdgeWrapping;
            tex.wrapT = THREE.ClampToEdgeWrapping;
            tex.minFilter = THREE.LinearMipmapLinearFilter;
            tex.magFilter = THREE.LinearFilter;
            tex.generateMipmaps = true;
            tex.colorSpace = THREE.SRGBColorSpace;
            return tex;
        }

        function createAlphaTex() {
            const W = 64, H = 256;
            const c = document.createElement('canvas');
            c.width = W; c.height = H;
            const ctx = c.getContext('2d');
            const img = ctx.createImageData(W, H);
            for (let y = 0; y < H; y++) {
                const t = y / H;
                for (let x = 0; x < W; x++) {
                    const xu = x / W;
                    const ef = 1 - Math.abs(xu - 0.5) * 2;
                    const ea = Math.pow(ef, 1.8);
                    const ta = 1 - Math.pow(t, 1.5) * 0.78;
                    const a = Math.floor(Math.min(255, ta * ea * 255));
                    const idx = (y * W + x) * 4;
                    img.data[idx] = img.data[idx + 1] = img.data[idx + 2] = 255;
                    img.data[idx + 3] = a;
                }
            }
            ctx.putImageData(img, 0, 0);
            const tex = new THREE.CanvasTexture(c);
            tex.wrapS = THREE.ClampToEdgeWrapping;
            tex.wrapT = THREE.ClampToEdgeWrapping;
            tex.minFilter = THREE.LinearMipmapLinearFilter;
            tex.magFilter = THREE.LinearFilter;
            tex.generateMipmaps = true;
            return tex;
        }

        const bladeTex = createBladeTex();
        const alphaTex = createAlphaTex();

        function createCurvedBladeGeo(bend, segs) {
            const bh = 0.026, th = 0.0022, H = 1.0;
            const posA = [], uvA = [];
            for (let s = 0; s < segs; s++) {
                const t0 = s / segs, t1 = (s + 1) / segs;
                const y0 = t0 * H, y1 = t1 * H;
                const x0 = bend * Math.sin(t0 * Math.PI / 2);
                const x1 = bend * Math.sin(t1 * Math.PI / 2);
                const w0 = bh * (1 - t0) + th * t0;
                const w1 = bh * (1 - t1) + th * t1;
                posA.push(x0 - w0, y0, 0, x0 + w0, y0, 0, x1 - w1, y1, 0);
                posA.push(x0 + w0, y0, 0, x1 + w1, y1, 0, x1 - w1, y1, 0);
                uvA.push(0, t0, 1, t0, 0, t1);
                uvA.push(1, t0, 1, t1, 0, t1);
                posA.push(x0 + w0, y0, 0, x0 - w0, y0, 0, x1 + w1, y1, 0);
                posA.push(x0 - w0, y0, 0, x1 - w1, y1, 0, x1 + w1, y1, 0);
                uvA.push(0, t0, 1, t0, 0, t1);
                uvA.push(1, t0, 1, t1, 0, t1);
            }
            const g = new THREE.BufferGeometry();
            g.setAttribute('position', new THREE.BufferAttribute(new Float32Array(posA), 3));
            g.setAttribute('uv', new THREE.BufferAttribute(new Float32Array(uvA), 2));
            g.computeVertexNormals();
            return g;
        }

        const BENDS = [-0.24, -0.15, -0.07, 0.0, 0.07, 0.15, 0.24];
        const PER_MESH = 3200;
        const TOTAL = BENDS.length * PER_MESH; // 22400
        const SEGS = 7;

        const meshes = [], allData = [], dummies = [];
        const grassGrp = new THREE.Group();
        core.add(grassGrp);

        const up = new THREE.Vector3(0, 1, 0);
        const axis = new THREE.Vector3();
        const q1 = new THREE.Quaternion();
        const q2 = new THREE.Quaternion();

        for (let m = 0; m < BENDS.length; m++) {
            const bladeGeo = createCurvedBladeGeo(BENDS[m], SEGS);
            const mat = new THREE.MeshStandardMaterial({
                map: bladeTex,
                alphaMap: alphaTex,
                alphaTest: 0.35,
                roughness: 0.5,
                metalness: 0.0,
                side: THREE.DoubleSide,
                color: new THREE.Color('#ffffff'),
                depthWrite: true,
            });

            const mesh = new THREE.InstancedMesh(bladeGeo, mat, PER_MESH);
            mesh.castShadow = true;
            mesh.receiveShadow = true;

            const data = [];
            const dummy = new THREE.Object3D();

            for (let i = 0; i < PER_MESH; i++) {
                // Bias toward upper hemisphere, slight randomness
                let vi;
                const rnd = Math.random();
                if (rnd < 0.6) {
                    vi = Math.floor(Math.random() * coreV);
                    while (surfP[vi].y < -0.2 && Math.random() < 0.6) vi = Math.floor(Math.random() * coreV);
                } else if (rnd < 0.88) {
                    vi = Math.floor(Math.random() * coreV);
                    while (Math.abs(surfP[vi].y) > 1.0 && Math.random() < 0.5) vi = Math.floor(Math.random() * coreV);
                } else {
                    vi = Math.floor(Math.random() * coreV);
                }

                const sp = surfP[vi].clone();
                const sn = surfN[vi].clone();

                // Jitter along tangent for natural clustering
                const jR = 0.01 + Math.random() * 0.05;
                const jA = Math.random() * Math.PI * 2;
                const tx = new THREE.Vector3(1, 0, 0).sub(sn.clone().multiplyScalar(sn.x)).normalize();
                const ty = new THREE.Vector3().crossVectors(sn, tx).normalize();
                const pos = sp.clone()
                    .add(tx.clone().multiplyScalar(Math.cos(jA) * jR))
                    .add(ty.clone().multiplyScalar(Math.sin(jA) * jR))
                    .normalize().multiplyScalar(coreR);

                const bladeH = 0.15 + Math.random() * 0.55;
                const threshold = Math.random() * 0.78;
                const growthSpd = 0.25 + Math.random() * 0.7;
                const tilt = (Math.random() - 0.5) * 0.55;
                const tiltDir = Math.random() * Math.PI * 2;

                q1.setFromUnitVectors(up, sn);
                axis.set(Math.cos(tiltDir), 0, Math.sin(tiltDir));
                q2.setFromAxisAngle(axis, tilt);
                q1.multiply(q2);

                data.push({ position: pos, baseQuat: q1.clone(), bladeH, threshold, growthSpd });

                dummy.position.copy(pos);
                dummy.quaternion.copy(q1);
                dummy.scale.set(0.7, 0.001, 0.7);
                dummy.updateMatrix();
                mesh.setMatrixAt(i, dummy.matrix);
            }
            mesh.instanceMatrix.needsUpdate = true;

            const gc = new THREE.Color();
            for (let i = 0; i < PER_MESH; i++) {
                gc.setHSL(0.20 + Math.random() * 0.14, 0.45 + Math.random() * 0.5, 0.18 + Math.random() * 0.35);
                mesh.setColorAt(i, gc);
            }
            mesh.instanceColor.needsUpdate = true;

            meshes.push(mesh);
            allData.push(data);
            dummies.push(dummy);
            grassGrp.add(mesh);
        }

        // ===================== STATE =====================
        let curProg = 0, curRot = 0;
        let mx = 0, my = 0, tmx = 0, tmy = 0;

        function scrollProg() {
            return Math.max(0, Math.min(1, window.scrollY / (window.innerHeight * 4)));
        }

        // ===================== UPDATE GRASS =====================
        function updateGrass(prog) {
            for (let m = 0; m < meshes.length; m++) {
                const data = allData[m], mesh = meshes[m], dum = dummies[m];
                for (let i = 0; i < data.length; i++) {
                    const gd = data[i];
                    let s;
                    if (prog <= gd.threshold) {
                        s = 0.001;
                    } else if (prog >= gd.threshold + gd.growthSpd) {
                        s = gd.bladeH;
                    } else {
                        const t = (prog - gd.threshold) / gd.growthSpd;
                        const e = t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;
                        s = 0.001 + (gd.bladeH - 0.001) * e;
                    }
                    dum.position.copy(gd.position);
                    dum.quaternion.copy(gd.baseQuat);
                    dum.scale.set(0.7, Math.max(0.001, s), 0.7);
                    dum.updateMatrix();
                    mesh.setMatrixAt(i, dum.matrix);
                }
                mesh.instanceMatrix.needsUpdate = true;
            }
        }

        // ===================== MOUSE =====================
        window.addEventListener('mousemove', e => {
            tmx = (e.clientX / window.innerWidth) * 2 - 1;
            tmy = -(e.clientY / window.innerHeight) * 2 + 1;
        });

        // ===================== ANIMATE =====================
        const clk = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const dt = Math.min(clk.getDelta(), 0.1);
            const t = performance.now() * 0.001;

            // Scroll progress — fully reversible
            const tp = scrollProg();
            curProg += (tp - curProg) * 3.5 * dt;

            // Rotation
            const tr = curProg * Math.PI * 2.8;
            curRot += (tr - curRot) * 2.5 * dt;

            // Rotate both core and wireframe together
            core.rotation.y = curRot;
            core.rotation.x = Math.sin(curRot * 0.25) * 0.1;
            wireGroup.rotation.y = curRot;
            wireGroup.rotation.x = Math.sin(curRot * 0.25) * 0.1;
            techGroup.rotation.y = curRot * 0.6;
            techGroup.rotation.x = Math.sin(curRot * 0.2) * 0.06;

            updateGrass(curProg);

            // Tech particles
            for (const p of techParticles) {
                const u = p.userData;
                p.position.set(
                    u.base.x + Math.sin(t * u.spd + u.ph) * u.amp,
                    u.base.y + Math.cos(t * u.spd * 1.3 + u.ph) * u.amp,
                    u.base.z + Math.cos(t * u.spd * 0.7 + u.ph) * u.amp
                );
                const a = Math.atan2(p.position.z, p.position.x) + u.orb * dt;
                const r = Math.sqrt(p.position.x ** 2 + p.position.z ** 2);
                p.position.x = Math.cos(a) * r;
                p.position.z = Math.sin(a) * r;
            }

            // Pulsing glow on nodes
            const pulse = 0.7 + Math.sin(t * 2.5) * 0.3;
            nodeMat.color.setRGB(0, 0.8 + pulse * 0.2, 0.6 + pulse * 0.4);
            wireMat.opacity = 0.4 + Math.sin(t * 1.5) * 0.12;

            scrollHint.style.opacity = curProg > 0.05 ? Math.max(0, 1 - curProg * 10) : 1;

            mx += (tmx - mx) * 2.5 * dt;
            my += (tmy - my) * 2.5 * dt;
            camera.position.x = camBase.x + mx * 0.35;
            camera.position.y = camBase.y + my * 0.25;
            camera.lookAt(0, -0.1, 0);

            renderer.render(scene, camera);
        }

        // ===================== RESIZE =====================
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // ===================== START =====================
        updateGrass(0);
        animate();
    </script>
</body>
</html>
