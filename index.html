<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>丁羽微的作品集</title>
    <style>
        :root { --bg: #060a0f; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg);
            height: 500vh; overflow-x: hidden;
            overscroll-behavior: none;
            font-family: 'Georgia', 'Noto Serif SC', 'STSong', serif;
            cursor: default;
        }
        #canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 0; }
        .header {
            position: fixed; top: 0; left: 0; width: 100%;
            padding: 28px 40px; display: flex;
            justify-content: space-between; align-items: flex-start;
            z-index: 10; pointer-events: none;
        }
        .logo {
            font-size: 1.25rem; font-weight: 700; color: #a0d8c0;
            letter-spacing: 0.06em; text-shadow: 0 0 24px rgba(0,220,160,0.3);
            pointer-events: auto;
        }
        .nav { display: flex; gap: 32px; pointer-events: auto; }
        .nav-btn {
            position: relative; display: inline-block; font-size: 0.95rem;
            font-family: 'Georgia', 'Noto Serif SC', serif; color: #80b8a0;
            text-decoration: none; letter-spacing: 0.08em; text-transform: lowercase;
            cursor: pointer; user-select: none;
            transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1), color 0.35s ease;
        }
        .nav-btn:hover { color: #00eebb; transform: translateY(-4px) scale(1.12); }
        .nav-btn::after {
            content: ''; position: absolute; left: 0; bottom: -4px;
            width: 0; height: 1px; background: #00ddbb; transition: width 0.35s ease;
        }
        .nav-btn:hover::after { width: 100%; }
        .scroll-hint {
            position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%);
            z-index: 10; display: flex; flex-direction: column; align-items: center;
            gap: 8px; pointer-events: none; transition: opacity 0.6s;
        }
        .scroll-hint span { font-size: 0.7rem; color: #608070; letter-spacing: 0.12em; }
        .scroll-arrow {
            width: 20px; height: 20px; border-right: 1px solid #608070;
            border-bottom: 1px solid #608070; transform: rotate(45deg);
            animation: scrollPulse 2s ease-in-out infinite;
        }
        @keyframes scrollPulse {
            0%, 100% { opacity: 0.3; transform: rotate(45deg) translateY(0); }
            50% { opacity: 1; transform: rotate(45deg) translateY(6px); }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo">丁羽微的作品集</div>
        <nav class="nav">
            <a href="#" class="nav-btn">project</a>
            <a href="#" class="nav-btn">about</a>
            <a href="#" class="nav-btn">contact</a>
        </nav>
    </header>
    <canvas id="canvas"></canvas>
    <div class="scroll-hint" id="scrollHint">
        <span>下滑探索</span>
        <div class="scroll-arrow"></div>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        const canvas = document.getElementById('canvas');
        const scrollHint = document.getElementById('scrollHint');

        // ===================== RENDERER =====================
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.05;
        renderer.outputColorSpace = THREE.SRGBColorSpace;

        // ===================== SCENE =====================
        const BG = '#060a0f';
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(BG);
        scene.fog = new THREE.Fog(BG, 9, 26);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.3, 50);
        const camBase = { x: 0, y: 0.3, z: 8.5 };
        camera.position.set(camBase.x, camBase.y, camBase.z);
        camera.lookAt(0, -0.1, 0);

        // ===================== LIGHTING =====================
        scene.add(new THREE.AmbientLight('#1a2a30', 2.2));
        const key = new THREE.DirectionalLight('#e8fff8', 5.8);
        key.position.set(5, 7, 5);
        key.castShadow = true;
        key.shadow.mapSize.set(2048, 2048);
        key.shadow.camera.near = 0.3; key.shadow.camera.far = 30;
        key.shadow.camera.left = -7; key.shadow.camera.right = 7;
        key.shadow.camera.top = 7; key.shadow.camera.bottom = -7;
        key.shadow.bias = -0.0002; key.shadow.normalBias = 0.03;
        scene.add(key);
        scene.add(new THREE.DirectionalLight('#4488aa', 2.0)).position.set(-4, 1, -4);
        scene.add(new THREE.DirectionalLight('#223344', 1.0)).position.set(0, -1.5, 3);
        const ptLight = new THREE.PointLight('#0044aa', 14, 8, 1.5);
        ptLight.position.set(0, -2.5, 0);
        scene.add(ptLight);

        // Shadow catcher
        const ground = new THREE.Mesh(
            new THREE.PlaneGeometry(20, 20),
            new THREE.ShadowMaterial({ opacity: 0.18 })
        );
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = -3.5;
        ground.receiveShadow = true;
        scene.add(ground);

        // ===================== SPHERE RADIUS =====================
        const R = 1.4;

        // ===================== HOLLOW LINE SPHERE =====================
        const mainGroup = new THREE.Group();
        scene.add(mainGroup);

        // ---- Line ring helper ----
        const lineRingGeo = new THREE.TorusGeometry(1, 0.008, 8, 120);
        // Reusable geometry — we scale to desired radius per ring

        function addLineRing(radius, rotX, rotY, rotZ, color, opacity) {
            const mat = new THREE.MeshBasicMaterial({ color, transparent: true, opacity });
            const ring = new THREE.Mesh(lineRingGeo, mat);
            ring.scale.setScalar(radius);
            ring.rotation.set(rotX, rotY, rotZ);
            mainGroup.add(ring);
            return ring;
        }

        // ---- Vertical great-circle rings (through poles, evenly spaced) ----
        const V_RINGS = 10;
        for (let i = 0; i < V_RINGS; i++) {
            const angle = (i / V_RINGS) * Math.PI;
            const brightness = 0.4 + Math.random() * 0.2;
            addLineRing(R, 0, angle, 0, '#00cc88', brightness);
            // Subtle blue offset ring
            if (i % 3 === 0) addLineRing(R * 1.004, 0, angle + 0.04, 0, '#0066cc', 0.15);
        }

        // ---- Horizontal latitude rings (parallel to equator) ----
        const H_RINGS = 7;
        for (let i = 0; i < H_RINGS; i++) {
            const lat = (i / (H_RINGS - 1) - 0.5) * Math.PI * 0.85; // from -67° to +67°
            const r = R * Math.cos(lat);
            const y = R * Math.sin(lat);
            const mat = new THREE.MeshBasicMaterial({
                color: '#00cc88',
                transparent: true,
                opacity: 0.3 + Math.random() * 0.2,
            });
            const ring = new THREE.Mesh(new THREE.TorusGeometry(r, 0.007, 8, 120), mat);
            ring.position.y = y;
            mainGroup.add(ring);
            // Subtle blue offset
            if (i % 2 === 0) {
                const r2 = new THREE.Mesh(
                    new THREE.TorusGeometry(r * 0.998, 0.005, 8, 100),
                    new THREE.MeshBasicMaterial({ color: '#0066cc', transparent: true, opacity: 0.12 })
                );
                r2.position.y = y;
                mainGroup.add(r2);
            }
        }

        // ---- Accent orbital rings (thicker, glowing) ----
        function makeOrbital(radius, tube, rx, ry, rz, color, opacity) {
            const geo = new THREE.TorusGeometry(radius, tube, 16, 120);
            const mat = new THREE.MeshStandardMaterial({
                color, roughness: 0.2, metalness: 0.9,
                emissive: color, emissiveIntensity: 0.6,
                transparent: true, opacity,
            });
            const torus = new THREE.Mesh(geo, mat);
            torus.rotation.set(rx, ry, rz);
            torus.castShadow = true;
            mainGroup.add(torus);
            return torus;
        }

        const orbR = R * 1.06;
        makeOrbital(orbR, 0.016, Math.PI / 2, 0, 0, '#00ddbb', 0.7);
        makeOrbital(orbR, 0.014, 1.1, 0.5, 0, '#00ccaa', 0.55);
        makeOrbital(orbR, 0.014, -1.1, -0.3, 0.6, '#0088cc', 0.5);

        // ---- Glowing intersection nodes ----
        const nodeGroup = new THREE.Group();
        mainGroup.add(nodeGroup);
        const nodeGeo = new THREE.SphereGeometry(0.024, 8, 8);
        const nodeMats = [
            new THREE.MeshBasicMaterial({ color: '#00ffcc' }),
            new THREE.MeshBasicMaterial({ color: '#00ddff' }),
            new THREE.MeshBasicMaterial({ color: '#00ffaa' }),
        ];

        // Place nodes at ring intersections (Fibonacci distribution on sphere)
        const NODE_COUNT = 40;
        const phiG = Math.PI * (3 - Math.sqrt(5));
        for (let i = 0; i < NODE_COUNT; i++) {
            const y = 1 - (i / (NODE_COUNT - 1)) * 2;
            const rAtY = Math.sqrt(1 - y * y);
            const theta = phiG * i;
            const node = new THREE.Mesh(nodeGeo, nodeMats[i % nodeMats.length]);
            node.position.set(Math.cos(theta) * rAtY * R, y * R, Math.sin(theta) * rAtY * R);
            nodeGroup.add(node);
        }

        // ===================== VIRTUAL SURFACE POINTS (for grass placement) =====================
        // Generate uniform points on the sphere surface
        const SURF_COUNT = 20000;
        const surfPoints = [];
        const surfNormals = [];

        // Fibonacci sphere for uniform distribution
        const phi_golden = Math.PI * (3 - Math.sqrt(5));
        for (let i = 0; i < SURF_COUNT; i++) {
            const y = 1 - (i / (SURF_COUNT - 1)) * 2;
            const radiusAtY = Math.sqrt(1 - y * y);
            const theta = phi_golden * i;
            const x = Math.cos(theta) * radiusAtY;
            const z = Math.sin(theta) * radiusAtY;
            surfPoints.push(new THREE.Vector3(x * R, y * R, z * R));
            surfNormals.push(new THREE.Vector3(x, y, z).normalize());
        }

        // ===================== GRASS TURF SYSTEM =====================
        function createBladeTex() {
            const W = 64, H = 256;
            const c = document.createElement('canvas');
            c.width = W; c.height = H;
            const ctx = c.getContext('2d');
            const img = ctx.createImageData(W, H);
            for (let y = 0; y < H; y++) {
                const t = y / H;
                for (let x = 0; x < W; x++) {
                    const xu = x / W;
                    const ef = 1 - Math.abs(xu - 0.5) * 2;
                    const ea = Math.pow(ef, 1.7);
                    const ta = 1 - Math.pow(t, 1.4) * 0.8;
                    const a = ta * ea;
                    const idx = (y * W + x) * 4;
                    img.data[idx] = Math.min(255, 14 + t * 48 + (Math.random() - 0.5) * 12);
                    img.data[idx + 1] = Math.min(255, 78 + t * 85 + (Math.random() - 0.5) * 18);
                    img.data[idx + 2] = Math.min(255, 12 + t * 25 + (Math.random() - 0.5) * 8);
                    img.data[idx + 3] = Math.floor(Math.min(255, a * 255));
                }
            }
            ctx.putImageData(img, 0, 0);
            ctx.strokeStyle = 'rgba(100,190,70,0.10)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(W / 2 - 1 + Math.random() * 2, 0);
            ctx.quadraticCurveTo(W / 2 + Math.random() * 3, H * 0.5, W / 2 - 1 + Math.random() * 2, H);
            ctx.stroke();
            const tex = new THREE.CanvasTexture(c);
            tex.wrapS = tex.wrapT = THREE.ClampToEdgeWrapping;
            tex.minFilter = THREE.LinearMipmapLinearFilter;
            tex.magFilter = THREE.LinearFilter;
            tex.generateMipmaps = true;
            tex.colorSpace = THREE.SRGBColorSpace;
            return tex;
        }

        function createAlphaTex() {
            const W = 64, H = 256;
            const c = document.createElement('canvas');
            c.width = W; c.height = H;
            const ctx = c.getContext('2d');
            const img = ctx.createImageData(W, H);
            for (let y = 0; y < H; y++) {
                const t = y / H;
                for (let x = 0; x < W; x++) {
                    const xu = x / W;
                    const ef = 1 - Math.abs(xu - 0.5) * 2;
                    const ea = Math.pow(ef, 1.7);
                    const ta = 1 - Math.pow(t, 1.4) * 0.8;
                    const a = Math.floor(Math.min(255, ta * ea * 255));
                    const idx = (y * W + x) * 4;
                    img.data[idx] = img.data[idx + 1] = img.data[idx + 2] = 255;
                    img.data[idx + 3] = a;
                }
            }
            ctx.putImageData(img, 0, 0);
            const tex = new THREE.CanvasTexture(c);
            tex.wrapS = tex.wrapT = THREE.ClampToEdgeWrapping;
            tex.minFilter = THREE.LinearMipmapLinearFilter;
            tex.magFilter = THREE.LinearFilter;
            tex.generateMipmaps = true;
            return tex;
        }

        const bladeTex = createBladeTex();
        const alphaTex = createAlphaTex();

        // Short turf blade geometry
        function createTurfBladeGeo(bend, segs) {
            const bh = 0.014, th = 0.0015, H = 1.0;
            const posA = [], uvA = [];
            for (let s = 0; s < segs; s++) {
                const t0 = s / segs, t1 = (s + 1) / segs;
                const y0 = t0 * H, y1 = t1 * H;
                const x0 = bend * Math.sin(t0 * Math.PI / 2);
                const x1 = bend * Math.sin(t1 * Math.PI / 2);
                const w0 = bh * (1 - t0) + th * t0;
                const w1 = bh * (1 - t1) + th * t1;
                posA.push(x0 - w0, y0, 0, x0 + w0, y0, 0, x1 - w1, y1, 0);
                posA.push(x0 + w0, y0, 0, x1 + w1, y1, 0, x1 - w1, y1, 0);
                uvA.push(0, t0, 1, t0, 0, t1);
                uvA.push(1, t0, 1, t1, 0, t1);
                posA.push(x0 + w0, y0, 0, x0 - w0, y0, 0, x1 + w1, y1, 0);
                posA.push(x0 - w0, y0, 0, x1 - w1, y1, 0, x1 + w1, y1, 0);
                uvA.push(0, t0, 1, t0, 0, t1);
                uvA.push(1, t0, 1, t1, 0, t1);
            }
            const g = new THREE.BufferGeometry();
            g.setAttribute('position', new THREE.BufferAttribute(new Float32Array(posA), 3));
            g.setAttribute('uv', new THREE.BufferAttribute(new Float32Array(uvA), 2));
            g.computeVertexNormals();
            return g;
        }

        // Use many bend variants for natural variety
        const BENDS = [-0.22, -0.16, -0.10, -0.05, 0.0, 0.05, 0.10, 0.16, 0.22];
        const PER_MESH = 6000;
        const TOTAL_GRASS = BENDS.length * PER_MESH; // 54000
        const SEGS = 5;

        const meshes = [], allData = [], dummies = [];
        const grassGrp = new THREE.Group();
        mainGroup.add(grassGrp);

        const upVec = new THREE.Vector3(0, 1, 0);
        const axis = new THREE.Vector3();
        const qA = new THREE.Quaternion();
        const qB = new THREE.Quaternion();

        // ---- Seed-based spreading ----
        // Pick random seed points on sphere — grass spreads from these
        const SEED_COUNT = 40;
        const seeds = [];
        for (let i = 0; i < SEED_COUNT; i++) {
            seeds.push(surfPoints[Math.floor(Math.random() * surfPoints.length)].clone());
        }

        // Precompute each surface point's distance to nearest seed
        const seedDist = new Float32Array(surfPoints.length);
        let maxDist = 0;
        for (let i = 0; i < surfPoints.length; i++) {
            let minD = Infinity;
            for (let j = 0; j < seeds.length; j++) {
                const d = surfPoints[i].distanceTo(seeds[j]);
                if (d < minD) minD = d;
            }
            seedDist[i] = minD;
            if (minD > maxDist) maxDist = minD;
        }
        // Normalize
        for (let i = 0; i < seedDist.length; i++) {
            seedDist[i] /= maxDist;
        }

        for (let m = 0; m < BENDS.length; m++) {
            const geo = createTurfBladeGeo(BENDS[m], SEGS);
            const mat = new THREE.MeshStandardMaterial({
                map: bladeTex,
                alphaMap: alphaTex,
                alphaTest: 0.35,
                roughness: 0.48,
                metalness: 0.0,
                side: THREE.DoubleSide,
                color: new THREE.Color('#ffffff'),
                depthWrite: true,
            });
            const mesh = new THREE.InstancedMesh(geo, mat, PER_MESH);
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            const data = [];
            const dum = new THREE.Object3D();

            for (let i = 0; i < PER_MESH; i++) {
                // Weighted random — more blades near seed points (lower seedDist), but still cover everywhere
                let si;
                if (Math.random() < 0.7) {
                    // Bias toward lower seedDist (near seeds, more grass)
                    si = Math.floor(Math.random() * surfPoints.length);
                    let att = 0;
                    while (seedDist[si] > Math.random() * 0.5 + 0.3 && att < 10) {
                        si = Math.floor(Math.random() * surfPoints.length);
                        att++;
                    }
                } else {
                    si = Math.floor(Math.random() * surfPoints.length);
                }

                const sp = surfPoints[si].clone();
                const sn = surfNormals[si].clone();

                // Tiny jitter for natural look
                const jR = 0.005 + Math.random() * 0.03;
                const jA = Math.random() * Math.PI * 2;
                const tx = new THREE.Vector3(1, 0, 0).sub(sn.clone().multiplyScalar(sn.x)).normalize();
                const ty = new THREE.Vector3().crossVectors(sn, tx).normalize();
                const pos = sp.clone()
                    .add(tx.clone().multiplyScalar(Math.cos(jA) * jR))
                    .add(ty.clone().multiplyScalar(Math.sin(jA) * jR))
                    .normalize().multiplyScalar(R);

                // Turf blade: very short
                const bladeH = 0.04 + Math.random() * 0.10;
                // Threshold: grass farther from seeds appears later
                const baseThreshold = seedDist[si] * 0.85;
                const threshold = baseThreshold + (Math.random() - 0.5) * 0.15;
                const growthSpd = 0.2 + Math.random() * 0.35;
                const tilt = (Math.random() - 0.5) * 0.45;
                const tiltDir = Math.random() * Math.PI * 2;

                qA.setFromUnitVectors(upVec, sn);
                axis.set(Math.cos(tiltDir), 0, Math.sin(tiltDir));
                qB.setFromAxisAngle(axis, tilt);
                qA.multiply(qB);

                data.push({ position: pos, baseQuat: qA.clone(), bladeH, threshold, growthSpd });

                dum.position.copy(pos);
                dum.quaternion.copy(qA);
                dum.scale.set(0.65, 0.001, 0.65);
                dum.updateMatrix();
                mesh.setMatrixAt(i, dum.matrix);
            }
            mesh.instanceMatrix.needsUpdate = true;

            // Color variation — natural turf greens
            const gc = new THREE.Color();
            for (let i = 0; i < PER_MESH; i++) {
                const hue = 0.19 + Math.random() * 0.16;
                const sat = 0.4 + Math.random() * 0.55;
                const lit = 0.16 + Math.random() * 0.38;
                gc.setHSL(hue, sat, lit);
                mesh.setColorAt(i, gc);
            }
            mesh.instanceColor.needsUpdate = true;

            meshes.push(mesh);
            allData.push(data);
            dummies.push(dum);
            grassGrp.add(mesh);
        }

        // ===================== FLOATING TECH PARTICLES =====================
        const techGrp = new THREE.Group();
        scene.add(techGrp);
        const techParts = [];
        for (let i = 0; i < 150; i++) {
            const size = 0.006 + Math.random() * 0.022;
            const p = new THREE.Mesh(
                new THREE.SphereGeometry(size, 4, 4),
                new THREE.MeshBasicMaterial({
                    color: Math.random() < 0.55 ? '#00ffcc' : '#0088dd',
                    transparent: true,
                    opacity: 0.25 + Math.random() * 0.6,
                })
            );
            const ang = Math.random() * Math.PI * 2;
            const phi = (Math.random() - 0.5) * Math.PI;
            const rad = R + 0.4 + Math.random() * 2.8;
            p.position.set(Math.cos(ang) * Math.cos(phi) * rad, Math.sin(phi) * rad, Math.sin(ang) * Math.cos(phi) * rad);
            p.userData = {
                base: p.position.clone(),
                spd: 0.08 + Math.random() * 0.5,
                amp: 0.08 + Math.random() * 0.4,
                ph: Math.random() * Math.PI * 2,
                orb: (Math.random() - 0.5) * 0.25,
            };
            techGrp.add(p);
            techParts.push(p);
        }

        // ===================== STATE =====================
        let curProg = 0, curRot = 0;
        let mx = 0, my = 0, tmx = 0, tmy = 0;

        function scrollProg() {
            return Math.max(0, Math.min(1, window.scrollY / (window.innerHeight * 4)));
        }

        function updateGrass(prog) {
            for (let m = 0; m < meshes.length; m++) {
                const data = allData[m], mesh = meshes[m], dum = dummies[m];
                for (let i = 0; i < data.length; i++) {
                    const gd = data[i];
                    let s;
                    const maxS = gd.bladeH;
                    if (prog <= gd.threshold) {
                        s = 0.001;
                    } else if (prog >= gd.threshold + gd.growthSpd) {
                        s = maxS;
                    } else {
                        const t = (prog - gd.threshold) / gd.growthSpd;
                        const e = t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;
                        s = 0.001 + (maxS - 0.001) * e;
                    }
                    dum.position.copy(gd.position);
                    dum.quaternion.copy(gd.baseQuat);
                    dum.scale.set(0.65, Math.max(0.001, s), 0.65);
                    dum.updateMatrix();
                    mesh.setMatrixAt(i, dum.matrix);
                }
                mesh.instanceMatrix.needsUpdate = true;
            }
        }

        window.addEventListener('mousemove', e => {
            tmx = (e.clientX / window.innerWidth) * 2 - 1;
            tmy = -(e.clientY / window.innerHeight) * 2 + 1;
        });

        // ===================== ANIMATION =====================
        const clk = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const dt = Math.min(clk.getDelta(), 0.1);
            const t = performance.now() * 0.001;

            const tp = scrollProg();
            curProg += (tp - curProg) * 3.5 * dt;

            const tr = curProg * Math.PI * 2.8;
            curRot += (tr - curRot) * 2.5 * dt;

            mainGroup.rotation.y = curRot;
            mainGroup.rotation.x = Math.sin(curRot * 0.22) * 0.09;

            updateGrass(curProg);

            for (const p of techParts) {
                const u = p.userData;
                p.position.set(
                    u.base.x + Math.sin(t * u.spd + u.ph) * u.amp,
                    u.base.y + Math.cos(t * u.spd * 1.3 + u.ph) * u.amp,
                    u.base.z + Math.cos(t * u.spd * 0.7 + u.ph) * u.amp
                );
                const a = Math.atan2(p.position.z, p.position.x) + u.orb * dt;
                const r = Math.sqrt(p.position.x ** 2 + p.position.z ** 2);
                p.position.x = Math.cos(a) * r;
                p.position.z = Math.sin(a) * r;
            }

            // Pulse glow
            const pulse = 0.65 + Math.sin(t * 2.2) * 0.35;
            ptLight.intensity = 10 + pulse * 8;

            scrollHint.style.opacity = curProg > 0.05 ? Math.max(0, 1 - curProg * 10) : 1;

            mx += (tmx - mx) * 2.5 * dt;
            my += (tmy - my) * 2.5 * dt;
            camera.position.x = camBase.x + mx * 0.35;
            camera.position.y = camBase.y + my * 0.25;
            camera.lookAt(0, -0.1, 0);

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        updateGrass(0);
        animate();
    </script>
</body>
</html>
