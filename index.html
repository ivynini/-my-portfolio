<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>丁羽微的作品集</title>
    <style>
        :root { --bg: #060a0f; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg);
            height: 500vh; overflow-x: hidden;
            overscroll-behavior: none;
            font-family: 'Georgia', 'Noto Serif SC', 'STSong', serif;
            cursor: default;
        }
        #canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 0; }
        .header {
            position: fixed; top: 0; left: 0; width: 100%;
            padding: 28px 40px; display: flex;
            justify-content: space-between; align-items: flex-start;
            z-index: 10; pointer-events: none;
        }
        .logo {
            font-size: 1.25rem; font-weight: 700; color: #a0d8c0;
            letter-spacing: 0.06em; text-shadow: 0 0 24px rgba(0,220,160,0.3);
            pointer-events: auto;
        }
        .nav { display: flex; gap: 32px; pointer-events: auto; }
        .nav-btn {
            position: relative; display: inline-block; font-size: 0.95rem;
            font-family: 'Georgia', 'Noto Serif SC', serif; color: #80b8a0;
            text-decoration: none; letter-spacing: 0.08em; text-transform: lowercase;
            cursor: pointer; user-select: none;
            transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1), color 0.35s ease;
        }
        .nav-btn:hover { color: #00eebb; transform: translateY(-4px) scale(1.12); }
        .nav-btn::after {
            content: ''; position: absolute; left: 0; bottom: -4px;
            width: 0; height: 1px; background: #00ddbb; transition: width 0.35s ease;
        }
        .nav-btn:hover::after { width: 100%; }
        .scroll-hint {
            position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%);
            z-index: 10; display: flex; flex-direction: column; align-items: center;
            gap: 8px; pointer-events: none; transition: opacity 0.6s;
        }
        .scroll-hint span { font-size: 0.7rem; color: #608070; letter-spacing: 0.12em; }
        .scroll-arrow {
            width: 20px; height: 20px; border-right: 1px solid #608070;
            border-bottom: 1px solid #608070; transform: rotate(45deg);
            animation: scrollPulse 2s ease-in-out infinite;
        }
        @keyframes scrollPulse {
            0%, 100% { opacity: 0.3; transform: rotate(45deg) translateY(0); }
            50% { opacity: 1; transform: rotate(45deg) translateY(6px); }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo">丁羽微的作品集</div>
        <nav class="nav">
            <a href="#" class="nav-btn">project</a>
            <a href="#" class="nav-btn">about</a>
            <a href="#" class="nav-btn">contact</a>
        </nav>
    </header>
    <canvas id="canvas"></canvas>
    <div class="scroll-hint" id="scrollHint">
        <span>下滑探索</span>
        <div class="scroll-arrow"></div>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        const canvas = document.getElementById('canvas');
        const scrollHint = document.getElementById('scrollHint');

        // ===================== RENDERER =====================
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.0;
        renderer.outputColorSpace = THREE.SRGBColorSpace;

        // ===================== SCENE =====================
        const BG = '#060a0f';
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(BG);
        scene.fog = new THREE.Fog(BG, 10, 28);

        // Camera — sphere centered
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.3, 50);
        const camBase = { x: 0, y: 0, z: 7.0 };
        camera.position.set(camBase.x, camBase.y, camBase.z);
        camera.lookAt(0, 0, 0);

        // ===================== LIGHTING =====================
        scene.add(new THREE.AmbientLight('#1a2a30', 2.0));

        const key = new THREE.DirectionalLight('#fffef5', 6.0);
        key.position.set(5, 6, 5);
        key.castShadow = true;
        key.shadow.mapSize.set(2048, 2048);
        key.shadow.camera.near = 0.3; key.shadow.camera.far = 30;
        key.shadow.camera.left = -6; key.shadow.camera.right = 6;
        key.shadow.camera.top = 6; key.shadow.camera.bottom = -6;
        key.shadow.bias = -0.0002; key.shadow.normalBias = 0.03;
        scene.add(key);

        const rim = new THREE.DirectionalLight('#4488aa', 2.2);
        rim.position.set(-4, 1, -4);
        scene.add(rim);

        const fill = new THREE.DirectionalLight('#223344', 1.0);
        fill.position.set(0, -1.5, 3);
        scene.add(fill);

        const accent = new THREE.PointLight('#0044aa', 12, 7, 1.5);
        accent.position.set(0, -2.8, 0);
        scene.add(accent);

        // Shadow catcher
        const ground = new THREE.Mesh(
            new THREE.PlaneGeometry(20, 20),
            new THREE.ShadowMaterial({ opacity: 0.2 })
        );
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = -3.2;
        ground.receiveShadow = true;
        scene.add(ground);

        // ===================== SPHERE =====================
        const R = 1.4;

        // ---- Procedural soil texture ----
        function createSoilTex() {
            const S = 1024;
            const c = document.createElement('canvas');
            c.width = S; c.height = S;
            const ctx = c.getContext('2d');

            const g = ctx.createRadialGradient(S * 0.38, S * 0.35, S * 0.02, S / 2, S / 2, S * 0.55);
            g.addColorStop(0, '#5a4a38');
            g.addColorStop(0.15, '#4a3a2a');
            g.addColorStop(0.35, '#3a2a1a');
            g.addColorStop(0.55, '#2a1a10');
            g.addColorStop(0.75, '#1a0e08');
            g.addColorStop(1, '#0a0500');
            ctx.fillStyle = g;
            ctx.fillRect(0, 0, S, S);

            const img = ctx.getImageData(0, 0, S, S);
            const d = img.data;
            for (let i = 0; i < d.length; i += 4) {
                const n = (Math.random() - 0.5) * 22;
                d[i] = Math.min(255, Math.max(0, d[i] + n));
                d[i + 1] = Math.min(255, Math.max(0, d[i + 1] + n * 0.6));
                d[i + 2] = Math.min(255, Math.max(0, d[i + 2] + n * 0.3));
            }
            ctx.putImageData(img, 0, 0);

            for (let i = 0; i < 80; i++) {
                const x = Math.random() * S, y = Math.random() * S;
                const rx = 4 + Math.random() * 20, ry = rx * (0.5 + Math.random());
                ctx.fillStyle = `rgba(5,3,0,${0.15 + Math.random() * 0.2})`;
                ctx.beginPath();
                ctx.ellipse(x, y, rx, ry, Math.random() * Math.PI, 0, Math.PI * 2);
                ctx.fill();
            }

            for (let i = 0; i < 400; i++) {
                const b = 80 + Math.random() * 60;
                ctx.fillStyle = `rgba(${b},${b * 0.75},${b * 0.45},${0.06 + Math.random() * 0.1})`;
                ctx.fillRect(Math.random() * S, Math.random() * S, 1 + Math.random() * 3, 1 + Math.random() * 3);
            }

            ctx.strokeStyle = 'rgba(5,3,0,0.2)';
            ctx.lineWidth = 0.5;
            for (let i = 0; i < 35; i++) {
                ctx.beginPath();
                let cx = Math.random() * S, cy = Math.random() * S;
                ctx.moveTo(cx, cy);
                for (let j = 0; j < 3 + Math.floor(Math.random() * 6); j++) {
                    cx += (Math.random() - 0.5) * 60;
                    cy += (Math.random() - 0.5) * 60;
                    ctx.lineTo(cx, cy);
                }
                ctx.stroke();
            }

            const tex = new THREE.CanvasTexture(c);
            tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
            tex.colorSpace = THREE.SRGBColorSpace;
            tex.anisotropy = 4;
            return tex;
        }

        // Soil sphere — starts transparent, becomes opaque with scroll
        const sphereGeo = new THREE.SphereGeometry(R * 0.995, 140, 140);
        const soilMat = new THREE.MeshStandardMaterial({
            map: createSoilTex(),
            roughness: 0.88,
            metalness: 0.02,
            color: new THREE.Color('#8a7a60'),
            transparent: true,
            opacity: 0.06,
            depthWrite: true,
        });
        const sphere = new THREE.Mesh(sphereGeo, soilMat);
        sphere.castShadow = true;
        sphere.receiveShadow = true;
        sphere.position.set(0, 0, 0);
        scene.add(sphere);

        // Store surface data
        const posAttr = sphereGeo.attributes.position;
        sphereGeo.computeVertexNormals();
        const normAttr = sphereGeo.attributes.normal;
        const V = posAttr.count;
        const surfP = [], surfN = [];
        for (let i = 0; i < V; i++) {
            surfP.push(new THREE.Vector3(posAttr.getX(i), posAttr.getY(i), posAttr.getZ(i)));
            surfN.push(new THREE.Vector3(normAttr.getX(i), normAttr.getY(i), normAttr.getZ(i)).normalize());
        }

        // ---- Hollow line sphere (visible initially, gets covered by soil) ----
        const lineRingGeo = new THREE.TorusGeometry(1, 0.007, 8, 120);

        function addLineRing(radius, rotX, rotY, rotZ, color, opacity) {
            const mat = new THREE.MeshBasicMaterial({ color, transparent: true, opacity });
            const ring = new THREE.Mesh(lineRingGeo, mat);
            ring.scale.setScalar(radius);
            ring.rotation.set(rotX, rotY, rotZ);
            scene.add(ring);
            return ring;
        }

        // Vertical great-circle rings
        const V_RINGS = 10;
        for (let i = 0; i < V_RINGS; i++) {
            addLineRing(R, 0, (i / V_RINGS) * Math.PI, 0, '#00cc88', 0.45);
            if (i % 3 === 0) addLineRing(R * 1.003, 0, (i / V_RINGS) * Math.PI + 0.03, 0, '#0066cc', 0.13);
        }

        // Horizontal latitude rings
        const H_RINGS = 7;
        for (let i = 0; i < H_RINGS; i++) {
            const lat = (i / (H_RINGS - 1) - 0.5) * Math.PI * 0.82;
            const r = R * Math.cos(lat);
            const y = R * Math.sin(lat);
            const mat = new THREE.MeshBasicMaterial({
                color: '#00cc88',
                transparent: true,
                opacity: 0.35,
            });
            const ring = new THREE.Mesh(new THREE.TorusGeometry(r, 0.006, 8, 100), mat);
            ring.position.y = y;
            scene.add(ring);
            if (i % 2 === 0) {
                const r2 = new THREE.Mesh(
                    new THREE.TorusGeometry(r * 0.997, 0.004, 8, 80),
                    new THREE.MeshBasicMaterial({ color: '#0066cc', transparent: true, opacity: 0.1 })
                );
                r2.position.y = y;
                scene.add(r2);
            }
        }

        // ---- Orbital rings (tech accent, floating slightly above surface) ----
        function makeRing(radius, tube, rx, ry, rz, color, opacity) {
            const geo = new THREE.TorusGeometry(radius, tube, 16, 140);
            const mat = new THREE.MeshStandardMaterial({
                color, roughness: 0.2, metalness: 0.9,
                emissive: color, emissiveIntensity: 0.55,
                transparent: true, opacity,
            });
            const torus = new THREE.Mesh(geo, mat);
            torus.rotation.set(rx, ry, rz);
            torus.castShadow = true;
            scene.add(torus);
            return torus;
        }
        const ringR = R * 1.08;
        const rings = [];
        rings.push(makeRing(ringR, 0.014, Math.PI / 2, 0, 0, '#00ddbb', 0.6));
        rings.push(makeRing(ringR, 0.012, 1.15, 0.45, 0, '#00ccaa', 0.5));
        rings.push(makeRing(ringR, 0.012, -1.1, -0.35, 0.55, '#0088cc', 0.45));

        // ---- Glowing nodes on rings ----
        const nodeGroup = new THREE.Group();
        scene.add(nodeGroup);
        const nodeGeo = new THREE.SphereGeometry(0.022, 8, 8);
        const nodeMats = [
            new THREE.MeshBasicMaterial({ color: '#00ffcc' }),
            new THREE.MeshBasicMaterial({ color: '#00ddff' }),
            new THREE.MeshBasicMaterial({ color: '#00ffaa' }),
        ];
        const phiG = Math.PI * (3 - Math.sqrt(5));
        for (let i = 0; i < 45; i++) {
            const y = 1 - (i / 44) * 2;
            const rAtY = Math.sqrt(1 - y * y);
            const node = new THREE.Mesh(nodeGeo, nodeMats[i % 3]);
            node.position.set(
                Math.cos(phiG * i) * rAtY * ringR,
                y * ringR,
                Math.sin(phiG * i) * rAtY * ringR
            );
            nodeGroup.add(node);
        }

        // ===================== GRASS TURF =====================
        function createBladeTex() {
            const W = 64, H = 256;
            const c = document.createElement('canvas');
            c.width = W; c.height = H;
            const ctx = c.getContext('2d');
            const img = ctx.createImageData(W, H);
            for (let y = 0; y < H; y++) {
                const t = y / H;
                for (let x = 0; x < W; x++) {
                    const xu = x / W;
                    const ef = 1 - Math.abs(xu - 0.5) * 2;
                    const ea = Math.pow(ef, 1.7);
                    const ta = 1 - Math.pow(t, 1.4) * 0.82;
                    const a = ta * ea;
                    const idx = (y * W + x) * 4;
                    img.data[idx] = Math.min(255, 12 + t * 50 + (Math.random() - 0.5) * 12);
                    img.data[idx + 1] = Math.min(255, 76 + t * 88 + (Math.random() - 0.5) * 18);
                    img.data[idx + 2] = Math.min(255, 10 + t * 26 + (Math.random() - 0.5) * 8);
                    img.data[idx + 3] = Math.floor(Math.min(255, a * 255));
                }
            }
            ctx.putImageData(img, 0, 0);
            ctx.strokeStyle = 'rgba(100,190,70,0.08)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(W / 2 - 1 + Math.random() * 2, 0);
            ctx.quadraticCurveTo(W / 2 + Math.random() * 3, H * 0.5, W / 2 - 1 + Math.random() * 2, H);
            ctx.stroke();
            const tex = new THREE.CanvasTexture(c);
            tex.wrapS = tex.wrapT = THREE.ClampToEdgeWrapping;
            tex.minFilter = THREE.LinearMipmapLinearFilter;
            tex.magFilter = THREE.LinearFilter;
            tex.generateMipmaps = true;
            tex.colorSpace = THREE.SRGBColorSpace;
            return tex;
        }

        function createAlphaTex() {
            const W = 64, H = 256;
            const c = document.createElement('canvas');
            c.width = W; c.height = H;
            const ctx = c.getContext('2d');
            const img = ctx.createImageData(W, H);
            for (let y = 0; y < H; y++) {
                const t = y / H;
                for (let x = 0; x < W; x++) {
                    const xu = x / W;
                    const ef = 1 - Math.abs(xu - 0.5) * 2;
                    const ea = Math.pow(ef, 1.7);
                    const ta = 1 - Math.pow(t, 1.4) * 0.82;
                    const a = Math.floor(Math.min(255, ta * ea * 255));
                    const idx = (y * W + x) * 4;
                    img.data[idx] = img.data[idx + 1] = img.data[idx + 2] = 255;
                    img.data[idx + 3] = a;
                }
            }
            ctx.putImageData(img, 0, 0);
            const tex = new THREE.CanvasTexture(c);
            tex.wrapS = tex.wrapT = THREE.ClampToEdgeWrapping;
            tex.minFilter = THREE.LinearMipmapLinearFilter;
            tex.magFilter = THREE.LinearFilter;
            tex.generateMipmaps = true;
            return tex;
        }

        const bladeTex = createBladeTex();
        const alphaTex = createAlphaTex();

        function createTurfBladeGeo(bend, segs) {
            const bh = 0.013, th = 0.0014, H = 1.0;
            const posA = [], uvA = [];
            for (let s = 0; s < segs; s++) {
                const t0 = s / segs, t1 = (s + 1) / segs;
                const y0 = t0 * H, y1 = t1 * H;
                const x0 = bend * Math.sin(t0 * Math.PI / 2);
                const x1 = bend * Math.sin(t1 * Math.PI / 2);
                const w0 = bh * (1 - t0) + th * t0;
                const w1 = bh * (1 - t1) + th * t1;
                posA.push(x0 - w0, y0, 0, x0 + w0, y0, 0, x1 - w1, y1, 0);
                posA.push(x0 + w0, y0, 0, x1 + w1, y1, 0, x1 - w1, y1, 0);
                uvA.push(0, t0, 1, t0, 0, t1);
                uvA.push(1, t0, 1, t1, 0, t1);
                posA.push(x0 + w0, y0, 0, x0 - w0, y0, 0, x1 + w1, y1, 0);
                posA.push(x0 - w0, y0, 0, x1 - w1, y1, 0, x1 + w1, y1, 0);
                uvA.push(0, t0, 1, t0, 0, t1);
                uvA.push(1, t0, 1, t1, 0, t1);
            }
            const g = new THREE.BufferGeometry();
            g.setAttribute('position', new THREE.BufferAttribute(new Float32Array(posA), 3));
            g.setAttribute('uv', new THREE.BufferAttribute(new Float32Array(uvA), 2));
            g.computeVertexNormals();
            return g;
        }

        const BENDS = [-0.22, -0.15, -0.08, 0.0, 0.08, 0.15, 0.22];
        const PER_MESH = 7000;
        const TOTAL = BENDS.length * PER_MESH; // 49000
        const SEGS = 5;

        const meshes = [], allData = [], dummies = [];
        const grassGrp = new THREE.Group();
        sphere.add(grassGrp);

        const upVec = new THREE.Vector3(0, 1, 0);
        const axis = new THREE.Vector3();
        const qA = new THREE.Quaternion();
        const qB = new THREE.Quaternion();

        // Seed-based spreading
        const SEEDS = 50;
        const seedDist = new Float32Array(V);
        const seedPts = [];
        for (let i = 0; i < SEEDS; i++) seedPts.push(surfP[Math.floor(Math.random() * V)].clone());

        let maxDist = 0;
        for (let i = 0; i < V; i++) {
            let minD = Infinity;
            for (let j = 0; j < SEEDS; j++) {
                const d = surfP[i].distanceTo(seedPts[j]);
                if (d < minD) minD = d;
            }
            seedDist[i] = minD;
            if (minD > maxDist) maxDist = minD;
        }
        for (let i = 0; i < V; i++) seedDist[i] /= maxDist;

        for (let m = 0; m < BENDS.length; m++) {
            const geo = createTurfBladeGeo(BENDS[m], SEGS);
            const mat = new THREE.MeshStandardMaterial({
                map: bladeTex,
                alphaMap: alphaTex,
                alphaTest: 0.35,
                roughness: 0.48,
                metalness: 0.0,
                side: THREE.DoubleSide,
                color: new THREE.Color('#ffffff'),
                depthWrite: true,
            });
            const mesh = new THREE.InstancedMesh(geo, mat, PER_MESH);
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            const data = [];
            const dum = new THREE.Object3D();

            for (let i = 0; i < PER_MESH; i++) {
                let vi;
                if (Math.random() < 0.7) {
                    vi = Math.floor(Math.random() * V);
                    let att = 0;
                    while (seedDist[vi] > Math.random() * 0.5 + 0.3 && att < 12) {
                        vi = Math.floor(Math.random() * V);
                        att++;
                    }
                } else {
                    vi = Math.floor(Math.random() * V);
                }

                const sp = surfP[vi].clone();
                const sn = surfN[vi].clone();
                const jR = 0.004 + Math.random() * 0.025;
                const jA = Math.random() * Math.PI * 2;
                const tx = new THREE.Vector3(1, 0, 0).sub(sn.clone().multiplyScalar(sn.x)).normalize();
                const ty = new THREE.Vector3().crossVectors(sn, tx).normalize();
                const pos = sp.clone()
                    .add(tx.clone().multiplyScalar(Math.cos(jA) * jR))
                    .add(ty.clone().multiplyScalar(Math.sin(jA) * jR))
                    .normalize().multiplyScalar(R);

                const bladeH = 0.04 + Math.random() * 0.11;
                const threshold = seedDist[vi] * 0.82 + (Math.random() - 0.5) * 0.14;
                const growthSpd = 0.18 + Math.random() * 0.35;
                const tilt = (Math.random() - 0.5) * 0.45;
                const tiltDir = Math.random() * Math.PI * 2;

                qA.setFromUnitVectors(upVec, sn);
                axis.set(Math.cos(tiltDir), 0, Math.sin(tiltDir));
                qB.setFromAxisAngle(axis, tilt);
                qA.multiply(qB);

                data.push({ position: pos, baseQuat: qA.clone(), bladeH, threshold, growthSpd });
                dum.position.copy(pos);
                dum.quaternion.copy(qA);
                dum.scale.set(0.6, 0.001, 0.6);
                dum.updateMatrix();
                mesh.setMatrixAt(i, dum.matrix);
            }
            mesh.instanceMatrix.needsUpdate = true;

            const gc = new THREE.Color();
            for (let i = 0; i < PER_MESH; i++) {
                gc.setHSL(0.19 + Math.random() * 0.16, 0.4 + Math.random() * 0.55, 0.16 + Math.random() * 0.38);
                mesh.setColorAt(i, gc);
            }
            mesh.instanceColor.needsUpdate = true;
            meshes.push(mesh);
            allData.push(data);
            dummies.push(dum);
            grassGrp.add(mesh);
        }

        // ===================== TECH PARTICLES =====================
        const techGrp = new THREE.Group();
        scene.add(techGrp);
        const techParts = [];
        for (let i = 0; i < 150; i++) {
            const p = new THREE.Mesh(
                new THREE.SphereGeometry(0.006 + Math.random() * 0.02, 4, 4),
                new THREE.MeshBasicMaterial({
                    color: Math.random() < 0.55 ? '#00ffcc' : '#0088dd',
                    transparent: true, opacity: 0.25 + Math.random() * 0.6,
                })
            );
            const ang = Math.random() * Math.PI * 2;
            const phi = (Math.random() - 0.5) * Math.PI;
            const rad = R + 0.5 + Math.random() * 2.5;
            p.position.set(Math.cos(ang) * Math.cos(phi) * rad, Math.sin(phi) * rad, Math.sin(ang) * Math.cos(phi) * rad);
            p.userData = {
                base: p.position.clone(),
                spd: 0.08 + Math.random() * 0.5,
                amp: 0.08 + Math.random() * 0.4,
                ph: Math.random() * Math.PI * 2,
                orb: (Math.random() - 0.5) * 0.25,
            };
            techGrp.add(p);
            techParts.push(p);
        }

        // ===================== STATE =====================
        let curProg = 0, curRot = 0;
        let mx = 0, my = 0, tmx = 0, tmy = 0;

        function scrollProg() {
            return Math.max(0, Math.min(1, window.scrollY / (window.innerHeight * 4)));
        }

        function updateGrass(prog) {
            for (let m = 0; m < meshes.length; m++) {
                const data = allData[m], mesh = meshes[m], dum = dummies[m];
                for (let i = 0; i < data.length; i++) {
                    const gd = data[i];
                    let s;
                    if (prog <= gd.threshold) {
                        s = 0.001;
                    } else if (prog >= gd.threshold + gd.growthSpd) {
                        s = gd.bladeH;
                    } else {
                        const t = (prog - gd.threshold) / gd.growthSpd;
                        const e = t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;
                        s = 0.001 + (gd.bladeH - 0.001) * e;
                    }
                    dum.position.copy(gd.position);
                    dum.quaternion.copy(gd.baseQuat);
                    dum.scale.set(0.6, Math.max(0.001, s), 0.6);
                    dum.updateMatrix();
                    mesh.setMatrixAt(i, dum.matrix);
                }
                mesh.instanceMatrix.needsUpdate = true;
            }
        }

        window.addEventListener('mousemove', e => {
            tmx = (e.clientX / window.innerWidth) * 2 - 1;
            tmy = -(e.clientY / window.innerHeight) * 2 + 1;
        });

        // ===================== ANIMATION =====================
        const clk = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const dt = Math.min(clk.getDelta(), 0.1);
            const t = performance.now() * 0.001;

            const tp = scrollProg();
            curProg += (tp - curProg) * 3.5 * dt;

            const tr = curProg * Math.PI * 2.5;
            curRot += (tr - curRot) * 2.5 * dt;
            sphere.rotation.y = curRot;
            sphere.rotation.x = Math.sin(curRot * 0.2) * 0.08;

            // Soil fades in as grass grows (covers the hollow sphere)
            const soilTarget = 0.06 + curProg * 0.94;
            soilMat.opacity += (soilTarget - soilMat.opacity) * 4.0 * dt;

            // Rotate rings with sphere
            nodeGroup.rotation.y = curRot;
            nodeGroup.rotation.x = Math.sin(curRot * 0.2) * 0.08;

            updateGrass(curProg);

            for (const p of techParts) {
                const u = p.userData;
                p.position.set(
                    u.base.x + Math.sin(t * u.spd + u.ph) * u.amp,
                    u.base.y + Math.cos(t * u.spd * 1.3 + u.ph) * u.amp,
                    u.base.z + Math.cos(t * u.spd * 0.7 + u.ph) * u.amp
                );
                const a = Math.atan2(p.position.z, p.position.x) + u.orb * dt;
                const r = Math.sqrt(p.position.x ** 2 + p.position.z ** 2);
                p.position.x = Math.cos(a) * r;
                p.position.z = Math.sin(a) * r;
            }

            const pulse = 0.6 + Math.sin(t * 2.2) * 0.4;
            accent.intensity = 10 + pulse * 6;

            scrollHint.style.opacity = curProg > 0.05 ? Math.max(0, 1 - curProg * 10) : 1;

            mx += (tmx - mx) * 2.5 * dt;
            my += (tmy - my) * 2.5 * dt;
            camera.position.x = camBase.x + mx * 0.3;
            camera.position.y = camBase.y + my * 0.22;
            camera.lookAt(0, 0, 0);

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        updateGrass(0);
        animate();
    </script>
</body>
</html>
